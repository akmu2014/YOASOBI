      background: linear-gradient(180deg, #0c0e13 0%, #121621 100%);

    .back-link {

      font-size: 18px;
      font-weight: 500;

      opacity: 0.92;
      transition: opacity 0.18s ease, transform 0.18s ease;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(3px);
    }

      opacity: 1;
      transform: translateX(-1px);
    }

      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      padding-top: 72px;
    }

    .panel {
      background: rgba(23, 26, 33, 0.94);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .song-title {
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      margin: 0 0 18px 0;
      line-height: 1.4;
    }

    .song-title rt {
      font-size: 0.45em;
      color: var(--ruby);
    }

    audio {
      width: 100%;
      margin-bottom: 22px;
      border-radius: 14px;
      background: #000;
    }

    .lyrics {
      max-height: 72vh;
      overflow: auto;
      scroll-behavior: smooth;
      padding-right: 6px;
    }

    .line {
      margin: 8px 0;
      padding: 14px 16px;
      border-radius: 18px;
      color: #7f8aa4;
      transition: 180ms ease;
      font-size: 30px;
      line-height: 2.0;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .line.active {
      color: var(--active);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.08);
      transform: scale(1.01);
    }

    .line:hover {
      background: rgba(255,255,255,0.03);
    }

    ruby rt {
      font-size: 0.48em;
      color: var(--ruby);
    }

    @media (max-width: 900px) {
      .song-title { font-size: 28px; }
      .line { font-size: 24px; }
      .back-link {
        top: 14px;
        left: 14px;
        font-size: 16px;
      }
      .app {
        padding-top: 64px;
      }
    }
  </style>
</head>

    const player = document.getElementById('player');
    const lyrics = document.getElementById('lyrics');
    const defaultAudioPath = './seventeen.mp3';

    function renderLyrics() {
      lyrics.innerHTML = '';
      lyricsData.forEach((line) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = line.html;
        div.addEventListener('click', () => {
          if (line.time != null) player.currentTime = line.time;
        });
        lyrics.appendChild(div);
      });
      refreshActive();
    }

    function refreshActive() {
      const t = player.currentTime || 0;
      const nodes = [...document.querySelectorAll('.line')];
      let activeIndex = -1;

      for (let i = 0; i < lyricsData.length; i++) {
        const start = lyricsData[i].time;
        const next = i < lyricsData.length - 1 ? lyricsData[i + 1].time : Infinity;
        if (t >= start && t < next) {
          activeIndex = i;
          break;
        }
      }

      nodes.forEach((node, i) => node.classList.toggle('active', i === activeIndex));

      const active = nodes[activeIndex];
      if (active) {
        active.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }

    player.addEventListener('timeupdate', refreshActive);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!player.src) return;
        if (player.paused) player.play();
        else player.pause();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        player.currentTime = Math.max(0, player.currentTime - 2);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        player.currentTime = Math.min(player.duration || Infinity, player.currentTime + 2);
      }
    });

    renderLyrics();
    player.src = defaultAudioPath;
    player.load();
  </script>
