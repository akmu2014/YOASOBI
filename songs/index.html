<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YOASOBI Songs</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --tile-bg: #0f0f0f;
      --tile-border: #2a2a2a;
      --tile-hover: #181818;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --ruby: #a9c7ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    body {
      padding: 32px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 1rem;
    }

    .tiles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 96px;
      padding: 18px 20px;
      border-radius: 20px;
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      color: var(--text);
      text-decoration: none;
      font-size: clamp(1.15rem, 2.5vw, 1.6rem);
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .tile:hover {
      background: var(--tile-hover);
      border-color: #4a4a4a;
      transform: translateY(-2px);
    }

    .tile.disabled {
      opacity: 0.72;
      cursor: default;
    }

    .tile.disabled:hover {
      transform: none;
      background: var(--tile-bg);
      border-color: var(--tile-border);
    }

    ruby rt {
      font-size: 0.48em;
      color: var(--ruby);
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link:hover {
      color: var(--text);
    }

    @media (max-width: 640px) {
      .tile {
        min-height: 84px;
        border-radius: 16px;
      }
    }
  </style>
</head>
