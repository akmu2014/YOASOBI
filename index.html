<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YOASOBI</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --tile-bg: #0f0f0f;
      --tile-border: #2a2a2a;
      --tile-hover: #181818;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 36px;
      color: var(--muted);
      font-size: 1rem;
    }

    .tiles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      padding: 28px;
      border-radius: 22px;
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      color: var(--text);
      text-decoration: none;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .tile:hover {
      background: var(--tile-hover);
      border-color: #4a4a4a;
      transform: translateY(-2px);
    }

    .tile.disabled {
      cursor: default;
      opacity: 0.72;
    }

    .tile.disabled:hover {
      transform: none;
      background: var(--tile-bg);
      border-color: var(--tile-border);
    }

    .footer {
      margin-top: 28px;
      color: #7f7f7f;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .tile {
        min-height: 130px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>YOASOBI</h1>
    <p class="subtitle">Tap a tile to continue</p>

    <section class="tiles">
      <a
        class="tile"
        href="https://akmu2014.github.io/YOASOBI/songs/index.html"
      >
        YOASOBI Songs
      </a>

      <a
        class="tile disabled"
        href="#"
        onclick="return false;"
      >
        Lilas Songs
      </a>
    </section>

    <div class="footer">monument vibe style landing page</div>
  </main>
</body>
</html>
